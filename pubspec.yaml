name: ps_app
description: "PS LASER — AI-Powered Manufacturing Operating System for iOS."
publish_to: 'none'

# v2.0.0 — iOS-first transformation
# Android is still fully supported as a secondary platform.
version: 2.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # ── Navigation & State ──────────────────────────────────────────────────────
  go_router: ^17.1.0
  provider: ^6.1.5+1

  # ── Storage & Security ──────────────────────────────────────────────────────
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  crypto: ^3.0.3

  # ── UI & Animation ──────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # ── Charts & Visualization ──────────────────────────────────────────────────
  fl_chart: ^1.1.1

  # ── Calendar ────────────────────────────────────────────────────────────────
  table_calendar: ^3.2.0

  # ── Voice / Speech ──────────────────────────────────────────────────────────
  speech_to_text: ^7.0.0

  # ── Network ─────────────────────────────────────────────────────────────────
  http: ^1.6.0

  # ── Utilities ───────────────────────────────────────────────────────────────
  intl: ^0.20.2

  # ── QR / Scanner ────────────────────────────────────────────────────────────
  mobile_scanner: ^7.2.0

  # ── PDF & Printing ──────────────────────────────────────────────────────────
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1

  # ── Firebase — Cloud Database & Notifications ───────────────────────────────
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# ── App Icons ──────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true                  # iOS icons enabled
  image_path: "assets/ps.png"
  min_sdk_android: 21
  ios_content_mode: scaleAspectFill

# ── Flutter ────────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/ps.png
    - assets/animations/         # Lottie animations (create dir)
